services:
  - type: web
    name: app-festa-1
    env: node
    plan: starter
    branch: main
    autoDeploy: true
    # region: frankfurt           # (opcional) escolhe Europa se quiseres latência menor
    healthCheckPath: /readyz
    numInstances: 1               # com Disk, mantém 1 instância

    buildCommand: npm ci && DATABASE_PATH=/tmp/festa-build-test.db SESSIONS_DB=/tmp/festa-build-sessions.sqlite npm test
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION         # evita upgrades de runtime inesperados
        value: 20
      - key: DATABASE_PATH        # o teu código deve ler daqui
        value: /opt/render/project/src/data/festa.db
      - key: SESSIONS_DB
        value: /opt/render/project/src/data/sessions.sqlite
      - key: PUBLIC_BASE_URL
        value: https://app-festa-1.onrender.com
      - key: SESSION_SECRET
        generateValue: true
      - key: TZ                   # logs/horários coerentes
        value: Europe/Lisbon

    disk:
      name: festa-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
